<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter With Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        button,
        span {
            font-size: xx-large;
        }
    </style>
</head>

<body>
    <div class="container d-flex justify-content-center mt-5">
        <button class="btn btn-success me-2" onclick="add()">+1</button>
        <span id="countVal" class="me-2">0</span>
        <button class="btn btn-danger" onclick="minus()">-1</button>
    </div>




    <script>
        getval()
        function getval() {
            getFromLocalVal = getFromLocal()
            console.log('getFromLocalVal', getFromLocalVal)
            if (getFromLocalVal) {
                document.getElementById('countVal').textContent = getFromLocalVal
            }
        }

        function add() {
            const spanElement = document.getElementById('countVal');
            let elementVal = spanElement.textContent;
            if (elementVal) elementVal++;
            console.log('elementVal', elementVal)
            saveToLocal(elementVal)
            getval()
        }

        function minus() {
            const spanElement = document.getElementById('countVal');
            let elementVal = spanElement.textContent;
            if (elementVal) elementVal--;
            console.log('minusElementVal', elementVal)
            saveToLocal(elementVal)
            getval()
        }

        function saveToLocal(p) {
            localStorage.setItem('counterButtonVal', JSON.stringify(p))
        }

        function getFromLocal() {
            return JSON.parse(localStorage.getItem('counterButtonVal') || '[]')
        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
