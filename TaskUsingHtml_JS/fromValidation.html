<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        #errUserName {
            display: none;
        }
    </style>
</head>

<body class="bg-info">
    <div class="container mt-4 d-flex justify-content-center ">
        <div style="width: 400px;">
            <div class="p-3 bg-light rounded mt-5">
                <!-- <form> -->
                <div class="mb-3">
                    <label for="InputUserName" class="form-label">User Name</label>
                    <input type="text" class="form-control" id="InputUserName" required>
                    <div id="demo">
                        <div class="alert alert-danger alert-dismissible fade show" role="alert" id="errUserName">
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="InputEmail1" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="InputEmail1" aria-describedby="emailHelp" required>
                </div>
                <div class="mb-3">
                    <label for="InputPassword1" class="form-label">Password</label>
                    <input type="password" class="form-control" id="InputPassword1" required>
                </div>
                <button class="btn btn-primary" onclick="register()">Register</button>
                <!-- </form> -->
            </div>
        </div>
    </div>

    <script>
        userNameElement = document.querySelector('#InputUserName')
        emailElement = document.querySelector('#InputEmail1')
        passwordElement = document.querySelector('#InputPassword1')
        getUser = [];

        function register() {
            console.log("****************")
            userName = userNameElement.value
            email = emailElement.value
            password = passwordElement.value

            speChars = `!@#$%^&*()_{""}`

            if (userName.trim().length > 3) {
                if (!userName.includes(speChars)) {
                    // email validation  
                    var re = /\S+@\S+\.\S+/;
                    testEmailVal = re.test(email);
                    console.log('testEmailVal', testEmailVal);
                    if (testEmailVal == true) {
                        // password validation 
                        if (password.trim().length >= 6) {
                            alert("Register success")
                            window.location.reload()
                        }
                        else {
                            alert('Please enter 6 or more character password...')
                        }
                    }
                    else {
                        alert('Invalid Email...')
                    }
                } else {
                    alert("username must not include special character")
                }
            } else {
                // alert(" should contain at least 6 characters")
                erOne = " should contain at least 4 characters"
                document.getElementById("errUserName").style.display = 'block'
                document.getElementById("errUserName").innerHTML = `${erOne} 
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" onclick='demo()'></button>`

            }
        }

        function demo() {
            document.getElementById("demo").innerHTML = `
  <div class="alert alert-danger alert-dismissible fade show" role="alert" id="errUserName">
                    </div> `
        }

    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
