<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4 d-flex justify-content-center ">
        <div style="width: 400px;">
            <div class="p-3 bg-light rounded mt-5">
                <div class="mb-3">
                    <label for="InputPassword1" class="form-label">Password</label>
                    <input type="password" class="form-control" id="InputPassword1" required>
                </div>
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="togglePassword"
                        onclick="togglePasswordVisibility()">
                    <label class="form-check-label">Show Password</label>
                </div>
                <p id="strengthText" class="mt-1 fw-bold"></p>
                <button class="btn btn-primary" onclick="checker()">Password Checker</button>
            </div>
        </div>
    </div>



    <script>
        function checker() {
            const passEle = document.getElementById("InputPassword1");
            const pass = passEle.value;
            strengthTextVal = document.getElementById("strengthText");
            console.log('val', pass);
            strength = 0
            const specialChars = /[ ^A-Za-z0-9`!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~]/;

            if (pass.length >= 8) strength++;
            if (/[A-Z]/.test(pass)) strength++;
            if (/[0-9]/.test(pass)) strength++;
            // if (/[^A-Za-z0-9]/.test(pass)) strength++;
            if (specialChars.test(pass)) strength++;;
            let width = strength * 25;

            if (strength === 0) {
                strengthText.textContent = "very weak";
            } else if (strength === 1) {
                strengthText.textContent = "Weak";
                strengthTextVal.style.color = "red";
            } else if (strength === 2) {
                strengthText.textContent = "Medium";
                strengthTextVal.style.color = "orange";
            } else if (strength === 3) {
                strengthText.textContent = "Strong";
                strengthTextVal.style.color = "rgb(76, 217, 217)";
            } else {
                strengthText.textContent = "Very Strong";
                strengthTextVal.style.color = "green";
            }
        }

        function togglePasswordVisibility() {
            const inputShowPass = document.getElementById("InputPassword1");
            inputShowPass.type = inputShowPass.type === "password" ? "text" : "password";
        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
