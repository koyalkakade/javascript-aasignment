<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced JS</title>
</head>

<body>

    <h1 style="text-align: center;">
        <span id="hr"></span>
        :
        <span id="min"></span>
        :
        <span id="sec"></span>
    </h1>

    <script>

        function getDigiClock() {
            const today = new Date()
           // console.log(today)
            hr = today.getHours()
            // console.log(hr)
            document.getElementById("hr").textContent = hr

            min = today.getMinutes()
            // console.log(min)
            document.getElementById('min').textContent = min

            sec = today.getSeconds()
            // console.log(sec)
            document.getElementById('sec').textContent = sec
        }


        setInterval(getDigiClock, 1000)

        function displayName() {
            console.log("Company name -> Wisdom sprouts")
        }
        function getData(cb) {
            setTimeout(cb, 5000)
        }

        getData(displayName)

        console.log("start")
        for (i = 1; i <= 5; i++) {
            console.log(i)
        }
        console.log("End")
        console.log("________________________")
        console.log("START")
        setTimeout(() => {
            for (i = 1; i <= 5; i++) {
                console.log(i)
            }
        }, 3000)

        console.log("END")

        const msg = "Chai with success"
        const yesChai = false

        const ChaiInRain = new Promise((resolve, reject) => {

            if (yesChai) {
                resolve(msg)
            } else {
                reject("No Chai")
            }
        })

        ChaiInRain
            .then(data => console.log(data))
            .catch(err => console.log(err, "Erɽrrrrrrooooorrrrr"))

    </script>


</body>

</html>
