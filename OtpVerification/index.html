<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OPT Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container bg-primary w-75" style="height: 400px;margin-top: 80px;">
        <div class="row">
            <div class="col-12 col-md-6 p-5">
                <h3 class="text-white p-2" style="border-left: 4px solid white;">
                    OYP<br>Verfication<br> Javascript </h3>
            </div>
            <div class="col-12 col-md-6 p-5">
                <div class="container rounded bg-light">
                    <i class="bi bi-alipay"></i>
                    <p class="lead text-center">Enetr OTP</p>
                    <div class="container d-flex justify-content-round p-2">

                        <!-- //--chech legnth code -->
                        <!-- <input type="text" size="1" id="digit1" style="margin-left: 4px;" maxlength="1"
                            oninput="moveToNext(this,'digit2')"> -->

                        <input type="text" size="1" id="digit1" style="margin-left: 4px;"
                            oninput="moveToNext('digit2')">
                        <input type="text" size="1" id="digit2" style="margin-left: 4px;"
                            oninput="moveToNext('digit3')">
                        <input type="text" size="1" id="digit3" style="margin-left: 4px;"
                            oninput="moveToNext('digit4')">
                        <input type="text" size="1" id="digit4" style="margin-left: 4px;" oninput="moveToNext('btnV')">
                    </div>
                    <button class="btn btn-primary w-75 m-2" onclick="verifyOTP()" id="btnV">Varify OTP</button>
                </div>
            </div>
        </div>
        <button onclick="generateOTP()">Generate OTP</button>
    </div>
    </div>


    <script>
        otp = ''
        function generateOTP() {
            otp = String(1000 + Math.floor(Math.random() * 9000))
            alert(`You OTP ${otp}`)
            console.log('otp', otp)
        }

        function verifyOTP() {

            otp1 = document.getElementById('digit1').value;
            otp2 = document.getElementById('digit2').value;
            otp3 = document.getElementById('digit3').value;
            otp4 = document.getElementById('digit4').value;
            otpFromUser = otp1 + otp2 + otp3 + otp4;
            if (otp == otpFromUser) {
                alert('Verfiy Successgully')
            }
            else {
                alert('invalid OTP')
            }

            document.getElementById('digit1').value = ''
            document.getElementById('digit2').value = ''
            document.getElementById('digit3').value = ''
            document.getElementById('digit4').value = ''

        }

        function moveToNext(nextFieldId) {
            document.getElementById(nextFieldId).focus();
        }

        //----check length code
        //         function moveToNext(current, nextFieldId) {
        //     if (current.value.length >= current.maxLength) {
        //         document.getElementById(nextFieldId).focus();
        //     }
        // }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
