<body>
    <div class="container w-75 rounded m-5 p-3" style="background-color: rgb(223, 223, 223); height: 300px;">
        <h2>Assignment 1 . To Do List Manager</h2>
        <div class="container">
            <input type="text" id="inputAssgn1" />
            <button class="btn btn-primary" onclick="addToDos()">Add Task</button>
            <button class="btn btn-primary" onclick="clearAllToDo()">Clear All</button>
        </div>
        <div class="container" id="resultToDo"></div>
    </div>

    <script>
        toDos = []

        function renderToDos() {
            document.querySelector('#resultToDo').innerHTML = toDos.map((task, index) => `
                                    <div class='mb-1'>
                                        <b class='text-primary pe-5'>${task}</b>
                                        <button class='btn btn-danger'onclick='deleteTask(${index})'>DELETE</button>
                                    </div>
    `).join('')
        }


        function addToDos() {
            inputToDoElmt = document.querySelector('#inputAssgn1')
            newToDo = inputToDoElmt.value
            toDos.push(newToDo)
            // console.log(toDos)
            renderToDos()
            console.log(inputToDoElmt.value)
            inputToDoElmt.value = ''
            console.log(inputToDoElmt.value)

        }

        function clearAllToDo() {
            console.log(toDos)
            toDos = []
            renderToDos()
            console.log(toDos)
        }

        function deleteTask(i) {
            console.log(i)
            toDos.splice(i, 1)
            renderToDos()
        }

    </script>

    <!-- assignment 2  -->
    <section>
        <div class="container w-75 rounded m-5 p-3" style="background-color: rgb(223, 223, 223); height: 300px;">
            <h2>Assignment 2 . Marks Calculator</h2>
            <div class="container">
                <input type="text" id="inputAssgnMarks" />
                <button class="btn btn-primary" onclick="addMarks()">Add Marks</button>
                <button class="btn btn-primary" onclick="Calculate()">Calculate</button>
                <button class="btn btn-primary" onclick="Reset()">Reset</button>
            </div>
            <div class="container" id="resultMarks"></div>
        </div>
    </section>
    <script>
        inputAssgnMarksELMT = document.querySelector('#inputAssgnMarks')
        marksArray = []
        function addMarks() {
            inputMark = inputAssgnMarksELMT.value
            inputNum = parseInt(inputMark)
            if (isNaN(inputNum)) {
                alert("Enter valid Number")
            } else {
                marksArray.push(inputNum)
                console.log(marksArray)
            }
            inputAssgnMarksELMT.value = ''
        }
        function Reset() {
            marksArray = []
            document.querySelector('#resultMarks').innerHTML = ''
        }
        function Calculate() {
            // totalMarks = 0
            // for(i=0;i<marksArray.length;i++){
            //     totalMarks += marksArray[i]
            // }

            totalMarks1 = marksArray.reduce((totalMarks, mark) => totalMarks + mark, 0)
            avg = totalMarks1 / marksArray.length
            console.log(totalMarks1, avg)

            MaxNum = 0

            for (i = 0; i < marksArray.length; i++) {
                // MaxNum = marksArray[i]
                if (marksArray[i] > MaxNum) {
                    MaxNum = marksArray[i]
                }
            }

            // for(i=0;i<marksArray.legth;i++){
            //     if(marksArray[i] > marksArray[i+1] ){
            //         newMax = marksArray[i]
            //     }else{
            //         newMax = marksArray[i+1]
            //     }
            // }

            MinNum = Infinity

            for (i = 0; i < marksArray.length; i++) {
                // MaxNum = marksArray[i]
                if (marksArray[i] < MinNum) {
                    MinNum = marksArray[i]
                }
            }
            document.querySelector('#resultMarks').innerHTML = `
                                <div class='bg-light border-1 rounded mt-3 p-3'>
                                Total Marks =  ${totalMarks1}  <br />
                                Average = ${avg} <br />
                                Highest Marks = ${MaxNum} <br />
                                Lowest Marks = ${MinNum}
                                </div>
            `

        }

    </script>

    <section>

    <script>
        FoodArray = ['Paneer', 'Paneer masala', 'Tomato', 'Capsicum', 'Onion', 'Curd', 'Ginger-garlic paste', 'oil/ butter', 'salt', 'Coriander', 'Red chili powder', 'Garam masala']
        function SearchFood() {
            inputFoodElmt = document.querySelector('#inputFood')
            ingredient = inputFoodElmt.value

            // for (i = 0; i < FoodArray.length; i++) {

            //     if (ing == ingredient.toLowerCase()) {

            //         break;
            //     } else {
            //         document.querySelector('#resultFood').innerHTML = 'Not Found'
            //     }

            ingFromArray = FoodArray.find((ing) => ing.toLowerCase() == ingredient.toLowerCase())

    <section>
        <div class="container w-75 rounded m-5 p-3" style="background-color: rgb(223, 223, 223); height: 300px;">
            <h2>Assignment 4 Filter odd even Numbers</h2>
            <div class="container">
                <input type="number" id="inputNum11" placeholder="Enter a number" />
                <button class="btn btn-primary" onclick="addNum()">Add Number</button>
                <button class="btn btn-primary" onclick="showEven()">Show Even</button>
                <button class="btn btn-primary" onclick="showOdd()">Show Odd</button>
                <button class="btn btn-primary" onclick="clearNum()">Clear</button>
            </div>
            <div class="container">
                <div>
                    <span id="showAddNum"></span><br>
                </div>
                <h3>Even Number</h3>
                <input type="text" class="w-75" id="evenNumId" />
                <h3>Odd Number</h3>
                <input type="text" class="w-75" id="oddNumId" />
            </div>
        </div>
    </section>

    <script>
        //  numArray = [45, 76, 98, 90, 54, 23, 14, 62, 51]
        inputNumber1 = document.querySelector('#inputNum11')
        numArray = []
        function addNum() {
            inputNumber = inputNumber1.value
            inputNumber = parseInt(inputNumber)
            if (isNaN(inputNumber)) {
                alert("Enter valid Number")
            } else {
                numArray.push(inputNumber)
                //console.log(numArray)
            }
            inputNumber1.value = ''
            document.querySelector('#showAddNum').innerHTML = numArray
        }
        // evenNumArray = []
        // oddNumArray = []

        // for (i = 0; i < numArray.length; i++) {
        //     if (numArray[i] % 2 == 0) {
        //         evenNumArray.push(numArray[i])
        //     } else {
        //         oddNumArray.push(numArray[i])
        //     }
        // }

        EvenNumArrayFilter = []
        OddNumArrayFilter = []
        function showEven() {
            EvenNumArrayFilter = numArray.filter((number) => number % 2 == 0)
            // const inputElement = document.getElementById('evenNumId');
            // const arrayAsString = EvenNumArrayFilter.join(', ');
            // inputElement.value = arrayAsString;
            document.getElementById('evenNumId').value = EvenNumArrayFilter.toString()
            //console.log('EvenNumArrayFilter', EvenNumArrayFilter.toString())
        }
        function showOdd() {
            OddNumArrayFilter = numArray.filter((number) => number % 2 != 0)
            document.getElementById('oddNumId').value = OddNumArrayFilter.toString()
        }
        function clearNum() {
            document.getElementById('evenNumId').value = ''
            document.getElementById('oddNumId').value = ''
            inputNumber1.value = ''
            document.querySelector('#showAddNum').innerHTML = ''
        }
    </script>


    <section>
        <div class="container w-75 rounded m-5 p-3" style="background-color: rgb(223, 223, 223); height: 300px;">
            <h2>Sort Alphabetically</h2>
            <div class="container">
                <input type="text" id="inputName" placeholder="Enter a name" />
                <button class="btn btn-primary" onclick="addName()">Add Name</button>
                <button class="btn btn-primary" onclick="sortName()">Sort</button>
                <button class="btn btn-primary" onclick="resetName()">Reset</button>
            </div>
            <div class="container">
                <div>
                    <span id="showAddName"></span><br>
                </div>
                <div>
                    <input type="text" class="w-75" id="sortNmId" />
                </div>
            </div>
        </div>
    </section>


    <script>
        inputNm = document.querySelector('#inputName')
        nameArray = []
        function addName() {
            NameInput = parseInt(inputNm.value);
            if (isNaN(NameInput)) {
                nameArray.push(inputNm.value)
                console.log(numArray)
            } else {
                alert("Enter valid Name")
            }
            inputNm.value = ''
            document.querySelector('#showAddName').innerHTML = nameArray

        }

        function sortName() {
            const lowerCaseArray = nameArray.map(item => item.toLowerCase());
            document.getElementById('sortNmId').value = lowerCaseArray.sort();
        }

        function resetName() {
            nameArray = []
            document.querySelector('#showAddName').innerHTML = ''
            document.getElementById('sortNmId').value = ''
        }
    </script>
